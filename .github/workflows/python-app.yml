# scripts/tv_data_collector.py
import requests
import json
from datetime import datetime
import os

def fetch_tv_data():
    """
    抓取电视数据并保存
    """
    url = "http://www.2335.fun:1006/tv.txt?token=jd19880506"
    
    try:
        print("开始抓取电视数据...")
        
        # 设置请求头，避免被拒绝
        headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
        }
        
        # 抓取数据
        response = requests.get(url, headers=headers, timeout=30)
        response.encoding = 'utf-8'  # 设置编码
        
        if response.status_code == 200:
            data_content = response.text
            
            # 创建数据目录
            os.makedirs('data', exist_ok=True)
            os.makedirs('data/historical', exist_ok=True)
            
            # 保存最新数据
            with open('data/latest_tv.txt', 'w', encoding='utf-8') as f:
                f.write(data_content)
            
            # 保存带时间戳的历史数据
            timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
            with open(f'data/historical/tv_data_{timestamp}.txt', 'w', encoding='utf-8') as f:
                f.write(data_content)
            
            # 同时保存为JSON格式便于分析
            lines = data_content.strip().split('\n')
            channels = []
            
            for line in lines:
                if line.strip() and ',' in line:
                    parts = line.split(',')
                    if len(parts) >= 2:
                        channel = {
                            'name': parts[0].strip(),
                            'url': parts[1].strip(),
                            'group': parts[2].strip() if len(parts) > 2 else 'default'
                        }
                        channels.append(channel)
            
            # 保存JSON格式
            with open('data/tv_channels.json', 'w', encoding='utf-8') as f:
                json.dump({
                    'update_time': datetime.now().isoformat(),
                    'total_channels': len(channels),
                    'channels': channels
                }, f, ensure_ascii=False, indent=2)
            
            print(f"数据抓取成功！共获取 {len(channels)} 个频道")
            return True
            
        else:
            print(f"请求失败，状态码: {response.status_code}")
            return False
            
    except Exception as e:
        print(f"抓取数据时出错: {e}")
        return False

if __name__ == "__main__":
    fetch_tv_data()
